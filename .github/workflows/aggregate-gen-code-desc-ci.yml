name: CI

on:
  push:
    branches: [main]
    paths:
      - "MyStartups/AggregateGenCodeDesc/**"
  pull_request:
    branches: [main]
    paths:
      - "MyStartups/AggregateGenCodeDesc/**"

defaults:
  run:
    working-directory: MyStartups/AggregateGenCodeDesc

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Install SVN
        run: sudo apt-get update && sudo apt-get install -y subversion

      - name: Run unit tests
        run: python -m pytest -q --tb=short -m "not production_scale and not long_running and not experimental_svn"

  production-gate:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Install SVN
        run: sudo apt-get update && sudo apt-get install -y subversion

      - name: Run production gate
        run: bash run_production_gate.sh
